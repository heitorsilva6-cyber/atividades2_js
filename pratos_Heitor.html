<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pratos</title>
</head>

<body>
    <script>
        let resposta = prompt("O que você gostaria de comer hoje? (Pizza, Hambúrguer, Sushi ou Salada)");
        let prato = resposta;
        switch (prato) {
            case "Lasanha":
                document.write("Prato: Lasanha");
                break;
            case "Pizza":
                document.write("Prato: Pizza");
                break;
            case "Hambúrguer":
                document.write("Prato: Hambúrguer");
                break;
            case "Sushi":
                document.write("Prato: Sushi");
                break;
            case "Salada":
                document.write("Prato: Salada");
                break;
            default:
                document.write("prato não encontrado.");
        }
    </script>
</body></htm
