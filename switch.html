<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Switches</title>
</head>

<body>
    <script>
        let signo = "Virgem";
        switch (signo) {
            case "Aries":
                document.write("de 21/03 a 20/04: ");
                break;
            case "Touro":
                document.write("de 21/04 a 20/05: ");
                break;
            case "Gêmeos":
                document.write("de 21/05 a 20/06: ");
                break;
            case "Câncer":
                document.write("de 21/06 a 22/07: ");
                break;
            case "Leão":
                document.write("de 21/06 a 22/07: ");
                break;
            case "Virgem":
                document.write("de 21/03 a 20/04: ");
                break;

        }
    </script>
</body>

</html>
